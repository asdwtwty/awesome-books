<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Microsoft YaHei','PingFang SC','Hiragino Sans GB','Noto Sans CJK SC',sans-serif" font-size="14" fill="#000" stroke="#000">
  <style>
    .box   { fill:#fff; stroke:#000; stroke-width:1.5; }
    .doc   { fill:#fff; stroke:#000; stroke-width:1.5; }
    .check { fill:#fff; stroke:#000; stroke-width:1.5; }
    .title { font-weight:bold; text-anchor:middle; }
    .label { text-anchor:middle; }
    .arrow { fill:none; stroke:#000; stroke-width:1.5; marker-end:url(#arr2); }
    .reject{ fill:none; stroke:#000; stroke-width:1.5; stroke-dasharray:6,4; marker-end:url(#arr2); }
  </style>
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="500" y="28" class="title" font-size="18">图 2  知识卡片双表示格式转换流程图</text>

  <!-- 源格式 -->
  <rect class="box" x="60" y="80" width="220" height="160" rx="8"/>
  <text class="title" x="170" y="108">源格式（人工维护）</text>
  <text class="label" x="170" y="135">Markdown 正文</text>
  <text class="label" x="170" y="158">+ YAML 元数据头</text>
  <line x1="80" y1="172" x2="260" y2="172" stroke-width="0.8"/>
  <text class="label" x="170" y="194" font-size="12">card_id, type, scenario,</text>
  <text class="label" x="170" y="212" font-size="12">triggers, evidence, ...</text>

  <!-- 维护人员 -->
  <rect class="box" x="60" y="20" width="220" height="42" rx="6"/>
  <text class="title" x="170" y="46">医学专家</text>
  <line class="arrow" x1="170" y1="62" x2="170" y2="78"/>

  <!-- 转换器 -->
  <rect class="box" x="370" y="120" width="260" height="80" rx="8" fill="#f5f5f5"/>
  <text class="title" x="500" y="150">格式转换器</text>
  <text class="label" x="500" y="172">Source → Published</text>
  <text class="label" x="500" y="190" font-size="12">（解析 / 校验 / 序列化）</text>
  <line class="arrow" x1="282" y1="160" x2="368" y2="160"/>

  <!-- 校验五项 -->
  <text x="500" y="240" class="title">五项发布校验（任一不通过则阻断）</text>
  <g>
    <rect class="check" x="320" y="260" width="160" height="46" rx="6"/>
    <text class="label" x="400" y="280">a. ID 命名合规</text>
    <text class="label" x="400" y="298" font-size="11">正则表达式</text>

    <rect class="check" x="500" y="260" width="160" height="46" rx="6"/>
    <text class="label" x="580" y="280">b. 必填字段齐全</text>
    <text class="label" x="580" y="298" font-size="11">type/title/evidence</text>

    <rect class="check" x="680" y="260" width="160" height="46" rx="6"/>
    <text class="label" x="760" y="280">c. 证据来源有效</text>
    <text class="label" x="760" y="298" font-size="11">至少一条 + 章节定位</text>

    <rect class="check" x="410" y="320" width="160" height="46" rx="6"/>
    <text class="label" x="490" y="340">d. 引用目标存在</text>
    <text class="label" x="490" y="358" font-size="11">引用 ID 已发布</text>

    <rect class="check" x="590" y="320" width="160" height="46" rx="6"/>
    <text class="label" x="670" y="340">e. 受控词表一致</text>
    <text class="label" x="670" y="358" font-size="11">枚举值合规</text>
  </g>
  <line class="arrow" x1="500" y1="200" x2="500" y2="258"/>

  <!-- 判定 -->
  <polygon class="box" points="500,400 580,440 500,480 420,440"/>
  <text class="title" x="500" y="438">通过?</text>
  <line class="arrow" x1="500" y1="370" x2="500" y2="398"/>

  <!-- 发布格式 JSONL -->
  <rect class="box" x="690" y="410" width="240" height="120" rx="8"/>
  <text class="title" x="810" y="438">发布格式（机器调用）</text>
  <text class="label" x="810" y="462">JSONL 记录</text>
  <line x1="710" y1="476" x2="910" y2="476" stroke-width="0.8"/>
  <text class="label" x="810" y="498" font-size="12">{ "card_id": "...",</text>
  <text class="label" x="810" y="516" font-size="12">  "actions":[...] }</text>
  <line class="arrow" x1="580" y1="440" x2="688" y2="440"/>
  <text x="630" y="430" font-size="12">是</text>

  <!-- 阻断 -->
  <rect class="box" x="60" y="410" width="240" height="80" rx="8" fill="#f9f9f9"/>
  <text class="title" x="180" y="440">阻断发布 + 错误回执</text>
  <text class="label" x="180" y="464">返回校验失败原因</text>
  <text class="label" x="180" y="482">至维护人员修正</text>
  <line class="reject" x1="420" y1="440" x2="302" y2="440"/>
  <text x="350" y="430" font-size="12">否</text>

  <!-- 索引 / 调用 -->
  <rect class="box" x="690" y="560" width="240" height="60" rx="8"/>
  <text class="title" x="810" y="588">索引 / 调用 / 评估</text>
  <text class="label" x="810" y="608" font-size="12">BM25 + 稠密 + 元数据</text>
  <line class="arrow" x1="810" y1="530" x2="810" y2="558"/>

  <!-- 反馈回路 -->
  <line class="reject" x1="170" y1="490" x2="170" y2="240"/>
  <line class="reject" x1="170" y1="240" x2="170" y2="240"/>
  <text x="100" y="370" font-size="12">修正后重新提交</text>

  <!-- 双向无损 -->
  <line class="arrow" x1="688" y1="470" x2="630" y2="170"/>
  <text x="660" y="320" font-size="11">双向无损</text>
</svg>
