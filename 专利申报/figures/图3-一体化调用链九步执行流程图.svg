<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="'Microsoft YaHei','PingFang SC','Hiragino Sans GB','Noto Sans CJK SC',sans-serif" font-size="13" fill="#000" stroke="#000">
  <style>
    .box   { fill:#fff; stroke:#000; stroke-width:1.5; }
    .rule  { fill:#f0f0f0; stroke:#000; stroke-width:1.5; }
    .start { fill:#fff; stroke:#000; stroke-width:1.5; }
    .title { font-weight:bold; text-anchor:middle; }
    .label { text-anchor:middle; }
    .arrow { fill:none; stroke:#000; stroke-width:1.5; marker-end:url(#arr3); }
    .feed  { fill:none; stroke:#000; stroke-width:1.2; stroke-dasharray:5,4; marker-end:url(#arr3); }
  </style>
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="550" y="28" class="title" font-size="18">图 3  一体化调用链九步执行流程图</text>

  <!-- Step 0 入口 -->
  <ellipse class="start" cx="120" cy="100" rx="80" ry="32"/>
  <text class="title" x="120" y="105">用户查询输入</text>

  <!-- S5.1 查询解析与场景识别 -->
  <rect class="box" x="260" y="68" width="220" height="64" rx="8"/>
  <text class="title" x="370" y="92">① 查询解析与场景识别</text>
  <text class="label" x="370" y="114" font-size="12">提取意图、实体、五维场景</text>
  <line class="arrow" x1="200" y1="100" x2="258" y2="100"/>

  <!-- S5.2 规则前 -->
  <rect class="rule" x="540" y="68" width="220" height="64" rx="8"/>
  <text class="title" x="650" y="92">② 规则层 · 第一阶段</text>
  <text class="label" x="650" y="114" font-size="12">检索前预筛 / 拦截 / 改写</text>
  <line class="arrow" x1="480" y1="100" x2="538" y2="100"/>

  <!-- S5.3 混合检索 -->
  <rect class="box" x="820" y="68" width="220" height="64" rx="8"/>
  <text class="title" x="930" y="92">③ 混合检索</text>
  <text class="label" x="930" y="114" font-size="12">BM25 + 稠密 + 元数据</text>
  <line class="arrow" x1="760" y1="100" x2="818" y2="100"/>

  <!-- S5.4 关系扩展 -->
  <rect class="box" x="820" y="220" width="220" height="64" rx="8"/>
  <text class="title" x="930" y="244">④ 关系层扩展</text>
  <text class="label" x="930" y="266" font-size="12">precedes/triggers/refines/escalates</text>
  <line class="arrow" x1="930" y1="132" x2="930" y2="218"/>

  <!-- S5.5 规则后过滤 -->
  <rect class="rule" x="540" y="220" width="220" height="64" rx="8"/>
  <text class="title" x="650" y="244">⑤ 规则层 · 第二阶段</text>
  <text class="label" x="650" y="266" font-size="12">检索后过滤 / 移除冲突</text>
  <line class="arrow" x1="820" y1="252" x2="762" y2="252"/>

  <!-- S5.6 上下文编排 + LLM -->
  <rect class="box" x="260" y="220" width="220" height="64" rx="8"/>
  <text class="title" x="370" y="244">⑥ 上下文编排与生成</text>
  <text class="label" x="370" y="266" font-size="12">注入卡片 + LLM 标注来源</text>
  <line class="arrow" x1="540" y1="252" x2="482" y2="252"/>

  <!-- S5.7 规则后生成 -->
  <rect class="rule" x="260" y="370" width="220" height="64" rx="8"/>
  <text class="title" x="370" y="394">⑦ 规则层 · 第三阶段</text>
  <text class="label" x="370" y="416" font-size="12">生成后红旗复核 / 拦截</text>
  <line class="arrow" x1="370" y1="284" x2="370" y2="368"/>

  <!-- S5.8 证据溯源 -->
  <rect class="box" x="540" y="370" width="220" height="64" rx="8"/>
  <text class="title" x="650" y="394">⑧ 证据溯源 / 日志存储</text>
  <text class="label" x="650" y="416" font-size="12">trace_id 全步骤 JSON 持久化</text>
  <line class="arrow" x1="480" y1="402" x2="538" y2="402"/>

  <!-- 终点回答 -->
  <ellipse class="start" cx="930" cy="402" rx="100" ry="32"/>
  <text class="title" x="930" y="408">⑨ 回答输出（带证据）</text>
  <line class="arrow" x1="760" y1="402" x2="828" y2="402"/>

  <!-- 知识库与日志库 -->
  <rect class="box" x="60" y="530" width="240" height="80" rx="8" fill="#f9f9f9"/>
  <text class="title" x="180" y="558">知识仓储 / 索引</text>
  <text class="label" x="180" y="580" font-size="12">Markdown+YAML / JSONL</text>
  <text class="label" x="180" y="598" font-size="12">BM25 / 稠密 / 元数据 索引</text>

  <rect class="box" x="380" y="530" width="240" height="80" rx="8" fill="#f9f9f9"/>
  <text class="title" x="500" y="558">关系层 / 规则层</text>
  <text class="label" x="500" y="580" font-size="12">六类关系 + 三级规则</text>
  <text class="label" x="500" y="598" font-size="12">DSL 抽象语法树静态执行</text>

  <rect class="box" x="700" y="530" width="240" height="80" rx="8" fill="#f9f9f9"/>
  <text class="title" x="820" y="558">可观测层</text>
  <text class="label" x="820" y="580" font-size="12">trace_id 完整重放</text>
  <text class="label" x="820" y="598" font-size="12">证据/规则/路径/日志</text>

  <!-- 联系线（虚线，表明数据来源） -->
  <line class="feed" x1="180" y1="528" x2="370" y2="288"/>
  <line class="feed" x1="500" y1="528" x2="650" y2="288"/>
  <line class="feed" x1="500" y1="528" x2="650" y2="135"/>
  <line class="feed" x1="500" y1="528" x2="370" y2="438"/>
  <line class="feed" x1="820" y1="528" x2="650" y2="438"/>

  <!-- 阶段框 -->
  <rect x="248" y="56" width="800" height="92" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="258" y="52" font-size="11">阶段一：解析 + 检索前</text>

  <rect x="248" y="208" width="800" height="92" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="258" y="204" font-size="11">阶段二：检索 + 关系扩展 + 检索后</text>

  <rect x="248" y="358" width="800" height="92" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="258" y="354" font-size="11">阶段三：生成 + 复核 + 溯源</text>

  <!-- 图例 -->
  <g>
    <rect class="rule" x="60" y="668" width="20" height="14"/>
    <text x="90" y="680" font-size="12">规则层步骤</text>
    <rect class="box"  x="200" y="668" width="20" height="14"/>
    <text x="230" y="680" font-size="12">流程主步骤</text>
    <line class="feed" x1="350" y1="675" x2="400" y2="675"/>
    <text x="410" y="680" font-size="12">数据/规则依赖</text>
  </g>
</svg>
